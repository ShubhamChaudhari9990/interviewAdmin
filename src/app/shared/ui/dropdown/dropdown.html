<div
  class="app-dropdown"
  [class.app-dropdown--full]="fullWidth"
  [style.--dropdown-width]="fullWidth ? '100%' : width"
>
  <p-select
    [options]="options"
    optionLabel="label"
    optionValue="value"
    [ngModel]="value"
    (ngModelChange)="onValueChange($event)"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel"
    appendTo="body"
    styleClass="app-dropdown__select"
    panelStyleClass="app-dropdown__panel"
  />
</div>
