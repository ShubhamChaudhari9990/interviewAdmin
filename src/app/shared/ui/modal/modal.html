@if (open) {
  <div
    class="fixed inset-0 z-[1000] flex items-center justify-center p-6 max-sm:items-end max-sm:p-0"
    role="presentation"
  >
    <button
      type="button"
      class="absolute inset-0 m-0 cursor-pointer border-0 bg-slate-900/45 p-0"
      aria-label="Close dialog"
      (click)="onBackdropClick()"
    ></button>

    <div
      class="relative z-[1] flex max-h-[min(90vh,42rem)] w-full flex-col gap-5 overflow-hidden rounded-2xl border border-[var(--card-border)] bg-[var(--color-surface)] py-6 shadow-[0_24px_64px_rgba(15,23,42,0.18)] max-sm:max-h-[92vh] max-sm:gap-4 max-sm:rounded-t-2xl max-sm:rounded-b-none max-sm:py-5"
      [class.max-w-md]="size === 'sm'"
      [class.max-w-lg]="size === 'md'"
      [class.max-w-2xl]="size === 'lg'"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="title ? 'app-modal-title' : null"
      [attr.aria-describedby]="subtitle ? 'app-modal-subtitle' : null"
      (click)="$event.stopPropagation()"
    >
      <header class="flex shrink-0 items-start justify-between gap-4 px-7 max-sm:px-5">
        <div class="flex min-w-0 flex-col gap-2 pr-1">
          @if (title) {
            <h2 class="modal-title" id="app-modal-title">{{ title }}</h2>
          }
          @if (subtitle) {
            <p class="modal-subtitle mt-0.5 leading-[var(--leading-relaxed)]" id="app-modal-subtitle">
              {{ subtitle }}
            </p>
          }
        </div>

        @if (showCloseButton) {
          <app-button
            variant="icon"
            [icon]="icons.close"
            ariaLabel="Close dialog"
            (click)="close()"
          />
        }
      </header>

      <div class="min-h-0 flex-1 overflow-y-auto px-7 max-sm:px-5">
        <ng-content />
      </div>

      <footer class="app-modal__footer mt-1 shrink-0 px-7 pt-1 max-sm:px-5">
        <ng-content select="[modalFooter]" />
      </footer>
    </div>
  </div>
}
