<header
  class="sticky top-0 z-10 flex min-h-[var(--header-height)] shrink-0 flex-wrap items-center gap-3 border-b border-[var(--card-border)] bg-[var(--color-surface)] px-4 py-2.5 md:gap-4 md:px-6 md:py-3"
>
  <button
    type="button"
    class="admin-header__menu-btn inline-flex size-9 shrink-0 cursor-pointer items-center justify-center rounded-full border border-[var(--card-border)] bg-[var(--color-surface)] text-[var(--text-subtle)] max-lg:inline-flex lg:hidden"
    aria-label="Open navigation menu"
    (click)="menuToggle.emit()"
  >
    <app-icon [icon]="icons.menu" [size]="18" />
  </button>

  <div class="admin-header__search flex max-w-md flex-1 items-center max-md:order-3 max-md:max-w-none max-md:basis-full">
    <input
      class="admin-search-input box-border h-10 w-full rounded-full border border-[var(--card-border)] bg-slate-50 pr-4 pl-10 font-[family-name:var(--font-sans)] text-[length:var(--type-sm)] text-[var(--text-heading)] placeholder:text-[var(--text-faint)]"
      type="search"
      [placeholder]="searchPlaceholder"
      aria-label="Search"
    />
  </div>

  <div class="ml-auto flex shrink-0 items-center gap-2 md:gap-3">
    <div class="flex items-center gap-3 pl-2">
      <div class="hidden text-right md:block">
        <p class="m-0 text-[length:var(--type-sm)] font-semibold text-[var(--text-heading)]">
          {{ profile().name }}
        </p>
        @if (profile().role) {
          <p class="m-0 text-[length:var(--type-xs)] text-[var(--text-muted)]">{{ profile().role }}</p>
        }
      </div>
      <img
        class="size-10 rounded-full object-cover max-md:size-8"
        [src]="profile().avatar"
        [alt]="profile().name"
      />
    </div>
  </div>
</header>
