<div class="min-h-screen bg-slate-100 flex">
    <!-- Left Side -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-blue-700 to-indigo-900 items-center justify-center p-12">
        <div class="text-center text-white max-w-md">
            <div class="w-24 h-24 rounded-full bg-white/20 flex items-center justify-center mx-auto mb-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.121 17.804A9 9 0 1118.879 6.196M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <h1 class="text-5xl font-bold mb-4">
                Admin Panel
            </h1>
            <p class="text-lg text-blue-100 leading-8">
                Securely manage your application, users, rooms, revenue,
                inventory and staff from one place.
            </p>
        </div>
    </div>
    <!-- Login Form -->
    <div class="flex-1 flex items-center justify-center px-6 py-10">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">
            <div class="text-center">
                <h2 class="text-3xl font-bold text-slate-800">
                    Welcome Back 👋
                </h2>
                <p class="text-slate-500 mt-2">
                    Sign in to your account
                </p>
            </div>
            <form class="mt-8 space-y-5" (ngSubmit)="login()">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Email Address
                    </label>
                    <input type="email" name="email" [(ngModel)]="email" placeholder="admin@example.com"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100" />
                </div>
                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Password
                    </label>
                    <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100" />
                </div>
                <!-- Button -->
                <button type="submit"
                    class="w-full rounded-xl bg-blue-600 py-3 text-white font-semibold transition duration-300 hover:bg-blue-700 active:scale-95">
                    Login
                </button>
            </form>
        </div>
    </div>
</div>
